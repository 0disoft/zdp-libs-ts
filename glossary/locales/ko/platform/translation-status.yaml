id: platform.translation-status
label: Translation Status
slug: translation-status
short: "번역 현황(Translation Status)은 다국어 프로젝트에서 각 언어별로 얼마나 많은 번역 키가 완료되었는지, 누락되었는지, 또는 변경되었는지를 추적하는 지표입니다. 이 수치는 번역 품질 관리와 배포 결정에 중요한 참고 자료가 됩니다."
long: |-

  번역 현황은 보통 전체 키 개수 대비 번역 완료된 키의 비율로 표현되며, 특정 언어의 카탈로그 파일이 몇 개의 문자열을 포함하고 있는지 기준으로 계산합니다. 현대적인 i18n 관리 도구에서는 자동으로 키를 추출하고, 번역되지 않은 키를 강조 표시하며, 휴먼 번역 진행 상태를 대시보드로 보여줍니다. 또한 변경된 소스 문자열은 fuzzy 또는 변경됨 상태로 표시하여, 기존 번역을 재검토해야 함을 알려줍니다. 이러한 가시성은 대규모 다국어 프로젝트에서 번역의 일관성을 유지하는 데 필수적입니다.

  개발 중에는 번역 현황을 CI/CD 파이프라인에 통합하여, 특정 임계값 미만인 언어는 빌드 실패 처리할 수 있습니다. 또한 사용자에게는 번역이 누락된 경우 폴백 로케일을 보여주되, 운영팀에게는 번역률 보고서를 자동 발송하는 것이 일반적입니다. 번역 현황이 낮은 언어는 우선순위에서 제외하거나, 베타 사용자에게만 노출하는 전략도 가능합니다. 지속적인 모니터링과 개선 노력 없이는 다국어 경험의 품질을 유지하기 어렵습니다.
