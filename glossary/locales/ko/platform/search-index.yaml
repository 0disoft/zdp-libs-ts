id: platform.search-index
label: Search Index
slug: search-index
short: "검색 인덱스(Search Index)는 전문 검색 성능을 최적화하기 위해 문서의 단어들을 역인덱스 구조로 미리 가공해 저장한 데이터 구조입니다. 대규모 문서에서 키워드 검색 속도를 획기적으로 향상시키는 핵심 요소입니다."
long: |-

  역인덱스는 각 단어를 키로, 해당 단어가 등장하는 모든 문서 ID와 위치 정보를 값으로 저장합니다. 여기에 단어 빈도와 역문서 빈도 같은 통계 정보도 함께 포함되어, BM25나 TF-IDF 같은 관련성 점수 알고리즘의 기반이 됩니다. 대표적인 검색 엔진으로는 Elasticsearch, Apache Solr, Meilisearch, Typesense가 있으며, PostgreSQL과 MySQL도 GIN 인덱스 기반의 전문 검색 기능을 기본 제공합니다. 검색 인덱스가 없으면 수백만 건의 문서에서 패턴 매칭을 수행해야 하므로, 대규모 검색 기능 구현 시 필수 요소입니다.

  검색 인덱스 구축 시에는 토큰화, 정규화, 불용어 제거, 형태소 분석 등 언어별 전처리 과정이 필요합니다. 예를 들어 running, runs, ran을 모두 run으로 정규화하면 사용자가 어떤 형태로 검색하더라도 일관된 결과를 얻을 수 있습니다. 인덱스는 실시간 업데이트 또는 일괄 재색인 방식으로 관리할 수 있습니다. 또한 검색 품질을 높이기 위해 필드별 가중치, 동의어 사전, 맞춤법 교정 등의 기법이 추가로 적용되기도 합니다.
