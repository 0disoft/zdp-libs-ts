id: platform.svelte
label: Svelte
slug: svelte
short: "Svelte는 런타임이 아닌 컴파일 타임에 동작하는 JavaScript UI 프레임워크로, 가상 DOM 없이 반응형 UI를 구축합니다. 브라우저에 프레임워크 자체를 전혀 보내지 않아 번들 크기가 매우 작습니다."
long: |-

  Svelte는 React나 Vue와 달리 브라우저에 프레임워크 자체를 전혀 보내지 않습니다. 개발자가 `.svelte` 파일에 HTML, CSS, JavaScript를 작성하면, Svelte 컴파일러가 이를 순수한 바닐라 JavaScript로 변환하여 DOM을 직접 조작하도록 만듭니다. 상태가 변경되면 Svelte는 변경된 부분만 정밀하게 업데이트하는데, 이 과정에서 가상 DOM 비교 비용이 전혀 들지 않습니다. 결과적으로 Svelte로 만든 사이트는 매우 작은 번들 크기와 빠른 시작 시간을 자랑합니다.

  문법적으로 Svelte는 매우 직관적입니다. `$:` 레이블을 사용하여 반응형 선언을 하고, `let count = 0` 같은 변수가 자동으로 반응형이 됩니다. 또한 스타일은 기본적으로 컴포넌트 스코프로 캡슐화되어, CSS 충돌 걱정 없이 작성할 수 있습니다. 디자인 시스템과 함께 사용할 때는 CSS 커스텀 프로퍼티와 완벽하게 호환되며, 디자인 토큰을 컴파일 타임에 정적으로 분석할 수 있어 번들 크기를 최적화하기 유리합니다.
