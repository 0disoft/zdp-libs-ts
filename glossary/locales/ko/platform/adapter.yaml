id: platform.adapter
label: Adapter
slug: adapter
short: "어댑터(Adapter)는 서로 다른 인터페이스를 가진 두 시스템을 연결하여 호환되도록 만드는 디자인 패턴 또는 코드 계층입니다. 기존 코드를 수정하지 않고도 외부 라이브러리나 레거시 시스템을 재사용할 수 있게 해 줍니다."
long: |-

  어댑터 패턴은 기존 클래스의 인터페이스를 클라이언트가 기대하는 다른 인터페이스로 변환해 줍니다. 예를 들어 특정 데이터베이스나 API의 응답 형식을 프론트엔드에서 사용하는 모델 구조로 바꾸는 함수가 어댑터 역할을 합니다. 이를 통해 기존 코드를 수정하지 않고도 외부 라이브러리나 레거시 시스템을 재사용할 수 있습니다. 결합도를 낮추고 전체 시스템의 유지보수성을 높이는 효과가 있습니다.

  프레임워크 차원에서도 어댑터 개념이 자주 등장합니다. 예를 들어 `Next.js`나 `Nuxt.js`는 다양한 렌더링 방식을 추상화하면서, 실제 배포 환경에 맞춰 동작하도록 어댑터를 제공합니다. SvelteKit에서는 `@sveltejs/adapter-auto`, `adapter-node`, `adapter-static` 등이 이 역할을 합니다. 이렇게 하면 프레임워크 코드는 배포 환경의 차이를 신경 쓰지 않고 일관되게 작성할 수 있습니다.
