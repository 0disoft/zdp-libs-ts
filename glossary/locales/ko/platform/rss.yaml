id: platform.rss
label: RSS
slug: rss
short: "RSS(Really Simple Syndication)는 웹사이트의 새로운 콘텐츠를 요약하여 구독자에게 자동으로 배포하기 위한 XML 기반 피드 형식입니다. 사용자는 RSS 리더 앱에 블로그 주소를 등록하면 새 글이 올라올 때 자동으로 확인할 수 있습니다."
long: |-

  RSS는 1990년대 후반부터 사용된 가장 오래된 피드 형식으로, `<channel>`, `<item>`, `<title>`, `<link>`, `<description>` 등의 태그로 구성됩니다. 사용자는 RSS 리더 앱에 블로그 주소를 등록해 두면, 사이트에 새 글이 올라올 때마다 리더에서 자동으로 확인할 수 있어 매번 직접 방문할 필요가 없습니다. 버전으로는 `RSS 0.91`, `RSS 1.0`, `RSS 2.0` 등이 있지만, 사실상 `RSS 2.0`이 가장 널리 사용되었습니다. 이 방식은 정보 소비 효율을 크게 높여 웹 생태계에서 오랫동안 사용되어 왔습니다.

  단점으로는 표준이 다소 느슨하고, 같은 콘텐츠를 표현하는 방식이 구현체마다 달라 호환성 문제가 있었습니다. 또한 일부 태그로 미디어 파일 첨부가 가능하긴 했지만, 구조가 복잡하고 확장이 까다로웠습니다. 그럼에도 불구하고 뉴스 사이트, 개인 블로그, 유튜브 채널 등에서 현재도 널리 사용되고 있습니다. 현대 웹에서도 콘텐츠 구독과 배포의 기본적인 방법으로 자리 잡고 있습니다.
