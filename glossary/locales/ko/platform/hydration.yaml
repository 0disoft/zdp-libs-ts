id: platform.hydration
label: Hydration
slug: hydration
short: "Hydration은 서버 사이드 렌더링으로 생성된 정적 HTML에 JavaScript 이벤트 핸들러와 상호작용을 붙여 동적인 클라이언트 애플리케이션으로 전환하는 과정입니다. React, Vue, SvelteKit 등 현대 프레임워크에서 핵심적인 최적화 기법으로 사용됩니다."
long: |-

  Hydration은 서버가 먼저 완성된 HTML을 브라우저에 전송하면 사용자는 빠르게 화면을 볼 수 있습니다. 하지만 아직 버튼 클릭이나 입력 같은 상호작용은 불가능한 상태입니다. 이후 같은 컴포넌트 트리와 상태를 클라이언트에서 다시 생성하면서 기존 DOM 노드를 재사용하고 이벤트 리스너를 연결하는 것이 바로 Hydration입니다. 이 과정은 빠른 초기 로딩과 인터랙티브한 경험을 동시에 제공합니다.

  Hydration이 완료되기 전에 사용자가 버튼을 클릭하면 아무 반응이 없어 혼란을 줄 수 있습니다. 이를 방지하기 위해 준비 상태 표시나 이벤트 큐잉 기법을 사용하기도 합니다. 또한 부분 Hydration이나 Islands Architecture 같은 기법은 페이지 전체가 아닌 상호작용이 꼭 필요한 특정 영역만 수화하여 초기 JavaScript 비용을 크게 줄입니다. 이러한 최적화는 모바일 환경에서 특히 중요한 성능 이점을 가져옵니다.
