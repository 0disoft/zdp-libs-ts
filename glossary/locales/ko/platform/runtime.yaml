id: platform.runtime
label: Runtime
slug: runtime
short: "Runtime은 프로그램이 실제로 실행되는 환경 또는 실행 중인 상태 자체를 가리키는 용어입니다. 브라우저, Node, Python 인터프리터 등이 대표적인 런타임 예시입니다."
long: |-

  Runtime은 크게 두 가지 의미로 사용됩니다. 첫째는 런타임 환경으로, 코드가 실행되기 위해 필요한 API, 메모리 관리, 이벤트 루프 등을 제공하는 인프라를 말합니다. 예를 들어 브라우저에서는 `document`, `window` 객체를 제공하지만 `Node.js`에서는 `fs`, `process`를 제공합니다. 둘째는 실행 시간 자체를 의미하며, 런타임 에러는 컴파일 때가 아닌 실행 도중에 발생하는 오류를 가리킵니다.

  런타임의 특성을 이해하는 것은 성능 최적화와 디버깅에 매우 중요합니다. 예를 들어 빌드 타임에는 알 수 없는 사용자 입력이나 네트워크 상태가 런타임에서 변수로 작용합니다. 또한 런타임 환경 간 차이를 무시하면 `window is not defined` 같은 오류가 발생할 수 있습니다. 그래서 프레임워크에서는 조건부 임포트나 `useEffect` 같은 훅으로 런타임 컨텍스트를 구분하도록 돕습니다.
