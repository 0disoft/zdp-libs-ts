id: platform.sitemap
label: Sitemap
slug: sitemap
short: "Sitemap은 웹사이트에 있는 모든 중요한 URL의 목록을 XML 형식으로 정리한 파일입니다. 검색 엔진 크롤러에게 사이트의 구조와 각 페이지의 우선순위, 갱신 주기를 알려주는 역할을 합니다."
long: |-

  Sitemap은 특히 규모가 크거나 페이지 간 연결 구조가 복잡한 웹사이트, 또는 새로 생성된 페이지가 외부 링크 없이 고립되기 쉬운 웹사이트에서 필수적입니다. XML Sitemap에는 각 URL의 마지막 수정일, 변경 빈도, 상대적 우선순위를 함께 명시할 수 있습니다. 또한 이미지, 동영상, 뉴스 기사 등 특정 콘텐츠 유형만 모은 전용 Sitemap을 만들 수도 있습니다. 검색 엔진이 전체 구조를 체계적으로 파악하도록 돕는 역할을 합니다.

  Sitemap을 검색 엔진에 제출하는 방법은 여러 가지입니다. Google Search Console이나 Bing Webmaster Tools에 직접 파일 위치를 등록하거나, `robots.txt` 파일 안에 Sitemap 지시어를 추가할 수 있습니다. Sitemap이 너무 커지는 것을 방지하기 위해 여러 개의 Sitemap을 하나의 Sitemap 인덱스 파일로 묶어 관리하기도 합니다. 정기적으로 Sitemap을 갱신하고 검색 엔진에 재제출하는 것이 좋습니다.
