id: platform.localization
label: Localization
slug: localization
short: "Localization(L10n, 현지화)은 i18n(국제화)이 준비된 애플리케이션에 특정 Locale에 맞는 번역과 문화적 적응을 적용하는 구체적인 작업입니다. 텍스트 번역뿐 아니라 이미지, 색상, 상징, 형식 등을 대상 지역에 맞게 바꾸는 과정을 말합니다."
long: |-

  Localization은 번역가, 현지 전문가, 제품 매니저, QA 테스터가 협업하는 다차원적인 작업입니다. 가장 기본적인 작업은 모든 UI 텍스트를 대상 언어로 정확하게 번역하는 것입니다. 그러나 단순 번역만으로 끝나지 않으며, 이미지와 상징, 날짜 형식, 통화 단위, 주소 입력 방식, 측정 단위까지 대상 지역에 맞게 조정해야 할 수 있습니다. 예를 들어 날짜 형식을 바꾸거나, 단위를 마일에서 킬로미터로 바꾸는 것도 Localization의 범위입니다.

  Localization은 보통 계층적인 폴백 구조를 가집니다. 예를 들어 `ko-KR`에 대한 번역이 없으면 `ko`로, 그마저 없으면 기본 Locale로 폴백합니다. 현대 Localization 플랫폼은 개발자가 메시지 키를 추출하면 번역가가 웹 인터페이스에서 번역하고, QA가 컨텍스트 스크린샷을 보며 검수하고, 자동으로 PR을 생성해 코드베이스에 병합하는 파이프라인을 제공합니다. Localization은 한 번으로 끝나지 않으며, 새로운 기능이 추가될 때마다 지속적으로 번역을 업데이트해야 하는 라이프사이클입니다.
