id: platform.web-app-manifest
label: Web App Manifest
slug: web-app-manifest
short: "웹 앱 매니페스트(Web App Manifest)는 JSON 파일로, PWA가 사용자 기기에 설치될 때 앱의 이름, 아이콘, 시작 URL, 테마 색상, 디스플레이 모드를 정의합니다. 이 파일은 웹 애플리케이션을 네이티브 앱처럼 보이게 하고 설치 가능하게 만드는 핵심 요소입니다."
long: |-

  매니페스트 파일은 웹 애플리케이션을 네이티브 앱처럼 보이게 하고 설치 가능하게 만드는 핵심 요소입니다. `name`, `short_name`, `icons`, `start_url`, `background_color`, `theme_color`, `display`, `orientation` 등의 필드를 포함합니다. 사용자가 PWA를 홈 화면에 추가하면, 매니페스트에 지정된 아이콘과 스플래시 스크린이 표시되며 브라우저 주소창 없이 독립된 앱 창에서 실행됩니다. 이러한 설치 경험은 사용자가 웹 앱을 더 자주 이용하도록 돕습니다.

  매니페스트만 있다고 PWA가 완성되는 것은 아니며, Service Worker가 HTTPS 환경에서 등록되어 있어야 오프라인 지원 및 백그라운드 동기화 같은 기능까지 완전한 PWA로 인정받을 수 있습니다. Chrome DevTools의 Application 탭이나 Lighthouse 도구로 매니페스트의 유효성과 아이콘 크기 등을 검사할 수 있습니다. 올바르게 설정하면 Android에서는 비교적 자연스러운 설치 경험을 제공할 수 있고, iOS Safari에서는 일부 속성만 지원하므로 별도 meta 태그가 필요할 수 있습니다. 따라서 매니페스트 작성 시 각 플랫폼의 지원 범위를 확인하는 것이 좋습니다.
