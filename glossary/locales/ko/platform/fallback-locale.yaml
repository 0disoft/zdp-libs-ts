id: platform.fallback-locale
label: Fallback Locale
slug: fallback-locale
short: "폴백 로케일(Fallback Locale)은 사용자가 요청한 언어에 해당하는 번역이 없을 때 대체로 사용할 기본 언어를 지정하는 설정입니다. i18n 라이브러리에서는 `fallbackLocale` 또는 `fallbackLng` 옵션으로 이 동작을 설정할 수 있습니다."
long: |-

  다국어 지원 애플리케이션에서 사용자가 `fr-CA`를 요청했지만 해당 키에 대한 번역이 존재하지 않는 경우, 폴백 로케일 체인이 작동합니다. 일반적으로는 `fr`로 폴백한 후, 그래도 없으면 최종 폴백인 `en` 또는 `default` 로케일로 대체됩니다. i18n 라이브러리(`next-i18next`, `vue-i18n`, `react-intl` 등)에서는 `fallbackLocale` 또는 `fallbackLng` 옵션으로 이 동작을 설정할 수 있습니다. 이 체인은 사용자가 의도치 않게 번역 누락을 경험하지 않도록 돕습니다.

  적절한 폴백 전략은 사용자 경험에 큰 영향을 줍니다. 예를 들어 `en-US`를 요청했는데 `en-US` 번역이 없다면 `en-GB`보다는 `en`으로 폴백하는 것이 자연스럽습니다. 또한 특정 키에 대해서만 다른 폴백을 지정하는 예외 처리나, 전체 번역 파일이 없을 때만 폴백하도록 설정하는 방식도 가능합니다. 폴백 로케일을 잘못 설정하면 엉뚱한 언어가 섞여 표시될 수 있으므로, 가능한 모든 언어 키에 대해 번역을 완성하는 것이 가장 이상적입니다.
