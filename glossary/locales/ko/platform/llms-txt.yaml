id: platform.llms-txt
label: llms.txt
slug: llms-txt
short: "llms 파일은 웹사이트의 콘텐츠를 대규모 언어 모델이 효과적으로 읽고 활용할 수 있도록 구조화된 텍스트 형식으로 제공하는 파일입니다. AI 기반 검색에 최적화된 정보를 담습니다."
long: |-

  `llms.txt`는 비교적 최근에 제안된 관례로, 기존의 `robots.txt`가 검색 엔진 크롤러를 위한 것이라면 `llms.txt`는 AI 모델의 크롤러나 파서를 위한 AI 친화적 사이트맵에 가깝습니다. 일반적인 HTML 페이지는 내비게이션, 광고, 사이드바 등 불필요한 잡음이 많아 LLM이 핵심 내용만 추출하기 어렵습니다. `llms.txt`는 순수한 마크다운 또는 간단한 구조화 텍스트로 사이트의 핵심 문서, API 엔드포인트, FAQ, 데이터셋 등을 정리해 제공합니다. 문서 사이트라면 모든 API 레퍼런스 페이지의 링크와 간단한 요약을 여기에 담을 수 있습니다.

  이 파일의 주요 용도는 AI 기반 검색 엔진이나 AI 어시스턴트가 웹사이트를 방문했을 때, 불필요한 크롤링 부하 없이도 가장 유용한 정보만 빠르게 획득하도록 돕는 것입니다. 사이트 소유자는 `llms.txt`를 통해 어떤 정보를 AI 실시간 참조에 적합한 형태로 제공할지 선택할 수 있습니다. 다만 아직 공식 웹 표준은 아니므로, 접근 제어나 학습 허용 여부를 보장하는 보안 장치로 보아서는 안 됩니다. `robots.txt`와 유사하게 `llms.txt`와 `llms-full.txt`를 함께 제공하는 사례도 있습니다.
