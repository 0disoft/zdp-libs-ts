label: Astro
slug: astro
short: "Astro는 JavaScript 기반의 정적 사이트 생성기로, 부분 하이드레이션을 통해 최소한의 클라이언트 JavaScript만 전송하는 웹 프레임워크입니다. 콘텐츠 중심의 사이트에서 빠른 로딩 속도와 우수한 성능을 제공합니다."
long: |-

  Astro는 MPA 방식으로 동작하며, 빌드 시 HTML을 렌더링한 후 필요한 컴포넌트만 선택적으로 클라이언트에서 인터랙티브하게 만듭니다. 예를 들어 페이지의 90%가 정적 콘텐츠이고 10%만 React 상호작용이 필요하다면, 그 10%만 React 관련 JavaScript를 로드합니다. 이로 인해 거의 모든 페이지가 순수 HTML에 가까운 속도를 내면서도, 필요한 곳에서는 React, Vue, Svelte 등 다양한 UI 프레임워크를 섞어 쓸 수 있습니다. 이 방식은 웹 성능을 크게 향상시키고 사용자 경험을 개선합니다.

  Astro의 핵심 개념은 아일랜드 아키텍처입니다. 각 인터랙티브 UI 컴포넌트는 별도의 아일랜드로 취급되며, 각자 독립적으로 하이드레이션됩니다. 컨텐츠 중심의 사이트에 특히 강하며, 디자인 시스템 측면에서는 `.astro` 컴포넌트가 기본적으로 CSS 스코핑을 제공합니다. 최근에는 View Transitions API를 내장 지원하여 SPA 같은 부드러운 페이지 전환도 추가되었습니다.
