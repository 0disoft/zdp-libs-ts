id: design.sort-header
label: Sort Header
slug: sort-header
short: "Sort Header는 테이블이나 리스트에서 특정 열의 제목을 클릭하면 해당 열 기준으로 데이터의 정렬 순서를 바꾸는 인터페이스 요소입니다. 보통 열 제목 옆에 오름차순 또는 내림차순 아이콘이 표시됩니다."
long: |-
  Sort Header는 데이터 그리드에서 가장 흔히 볼 수 있는 상호작용 패턴 중 하나입니다. 사용자가 헤더를 한 번 클릭하면 오름차순(예: A-Z, 숫자 0-9)으로 정렬되며, 다시 클릭하면 내림차순으로 전환됩니다. 현재 정렬 기준이 되는 열에는 화살표나 강조 표시가 나타나 사용자가 현재 상태를 알 수 있게 합니다. 이를 통해 대용량 데이터를 빠르게 재구성하여 원하는 패턴을 쉽게 찾을 수 있습니다.

  접근성과 개발 측면에서 Sort Header는 상태 관리가 중요합니다. 현재 정렬 중인 열과 방향을 시각적 표시뿐만 아니라 `aria-sort` 속성으로도 알려줘야 스크린 리더 사용자가 이해할 수 있습니다. 다중 정렬을 지원할 경우 Shift 키를 누른 채 여러 헤더를 순서대로 클릭하여 1차, 2차 정렬 기준을 설정하기도 합니다. 데이터베이스 쿼리 성능을 고려할 때 실제로 정렬이 필요한 열에만 인덱스를 걸어두는 것이 효율적입니다.
