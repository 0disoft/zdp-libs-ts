id: design.disclosure
label: Disclosure
slug: disclosure
short: "디스클로저(Disclosure)는 추가 정보나 컨트롤을 숨겨두었다가 사용자의 동작(클릭, 탭)으로 나타나게 하는 UI 위젯입니다. 아코디언의 단일 항목 버전으로 볼 수 있습니다."
long: |-
  디스클로저는 아코디언과 유사하지만 일반적으로 하나의 독립적인 요소에 적용됩니다. 예를 들어 "더 보기" 버튼을 누르면 긴 텍스트 일부가 펼쳐지거나, 고급 검색 옵션을 보여줄 때 사용됩니다. 아코디언이 여러 섹션을 묶어 관리한다면, 디스클로저는 더 단순하고 가벼운 패턴입니다. 사용자는 추가 정보를 필요할 때만 선택적으로 노출할 수 있습니다.

  디스클로저를 구현할 때는 예측 가능성이 핵심입니다. 사용자가 무언가를 펼친다는 행동은 페이지 전체를 다시 로드하지 않고 정보를 추가로 본다는 인식을 줍니다. 따라서 펼쳐지는 애니메이션은 `200~300ms` 내외가 적절하며, 갑작스러운 레이아웃 이동을 방지하기 위해 공간이 미리 확보되거나 부드럽게 밀려나도록 해야 합니다. 접근성 측면에서는 버튼 역할과 확장 상태를 `aria-expanded`로 표시하는 것이 필수입니다.
