id: design.semantic-token
label: Semantic Token
slug: semantic-token
short: "시맨틱 토큰은 디자인 시스템에서 \"어디에 쓰이는가\"에 따라 이름을 붙인 디자인 토큰입니다. 예를 들어 배경색이나 버튼 호버 색상처럼 역할 기반으로 정의합니다."
long: |-
  시맨틱 토큰은 원시 값이나 기능 토큰을 한 단계 추상화한 것입니다. 디자인 컴포넌트가 특정 색상이나 간격 값을 직접 참조하는 대신, `button.background.hover` 같은 시맨틱 토큰을 참조하면 테마나 상태 변화에 유연하게 대응할 수 있습니다. 예를 들어 다크 모드에서 같은 시맨틱 토큰이 다른 원시 값을 가리키도록 변경할 수 있습니다. 이는 디자인 결정과 구현 사이의 추상층을 만들어 유지보수를 쉽게 합니다.

  시맨틱 토큰을 사용하면 유지보수성과 확장성이 크게 향상됩니다. 디자이너와 개발자 간에 "이 색상은 에러 상태를 뜻한다" 같은 공통 언어가 생깁니다. 나중에 브랜드 컬러가 바뀌어도 시맨틱 토큰이 가리키는 실제 값만 수정하면 전체 UI가 일관되게 갱신됩니다. 다크 모드, 고대비 모드, 브랜드 스킨 같은 변형도 시맨틱 토큰 매핑만 교체하여 구현할 수 있습니다.
