id: design.popover
label: Popover
slug: popover
short: "Popover(팝오버)는 버튼 클릭 등 사용자 액션에 의해 트리거되는 일시적인 UI 패널입니다. 현재 페이지 위에 떠서 추가 정보, 폼, 또는 간단한 상호작용을 제공합니다."
long: |-
  Popover은 Tooltip과 달리 더 복잡한 콘텐츠를 포함할 수 있습니다. 텍스트뿐만 아니라 링크, 버튼, 간단한 폼(예: 검색창, 날짜 선택기), 리스트, 아이콘 등 다양한 HTML 요소를 담을 수 있습니다. 일반적으로 클릭 또는 Enter 키로 열리고, 팝오버 바깥 영역을 클릭하거나 Esc 키를 누르면 닫힙니다. HTML 표준에는 `popover` 속성이 있으며, 지원 브라우저에서는 JavaScript 없이도 네이티브 Popover를 구현할 수 있습니다.

  디자인 시스템에서 Popover를 구현할 때는 포지셔닝, 포커스 관리, 접근성 역할을 함께 고려해야 합니다. 트리거 요소를 기준으로 상대적 위치(상단, 하단, 좌측, 우측)를 계산하고, 뷰포트 밖으로 나가면 플립하거나 오프셋을 조정해야 합니다. Popover가 열리면 내부의 첫 번째 의미 있는 요소나 패널 자체로 포커스를 옮기고, 닫힐 때는 이전 포커스 위치로 복원하는 것이 좋습니다. 접근성 역할은 내용에 따라 `dialog`, `menu`, `listbox`처럼 달라질 수 있으며, Tooltip과 달리 Popover는 닫기 전까지 사용자가 그 안에서 자유롭게 상호작용할 수 있어야 합니다.
