id: design.design-token
label: Design Token
slug: design-token
short: "디자인 토큰은 색상, 폰트 크기, 간격, 애니메이션 등 디자인 결정을 플랫폼 중립적인 키-값 쌍으로 저장한 원자적 단위입니다. 이를 통해 디자이너와 개발자 간에 단일 진실 공급원을 만들 수 있습니다."
long: |-
  디자인 토큰은 디자인 시스템의 가장 작은 빌딩 블록입니다. 예를 들어 `color.blue.500: "#0066FF"`, `spacing.md: "16px"`, `font.size.body: "1rem"` 같은 형태로 저장되며, JSON, YAML, CSS 커스텀 프로퍼티 등 다양한 형식으로 표현됩니다. 토큰을 사용하면 디자이너가 피그마에서 정의한 값이 개발자의 코드와 동기화되는 단일 진실 공급원을 만들 수 있습니다. 이는 디자인과 개발 간의 불일치를 줄이고 유지보수를 쉽게 합니다.

  디자인 토큰은 일반적으로 원시 토큰에서 기능 토큰을 거쳐 시맨틱 토큰으로 연결되는 계층 구조를 가집니다. 이 구조를 통해 브랜드 기본 색상이 특정 UI 역할에 어떻게 매핑되는지 명확해집니다. 또한 `Style Dictionary` 같은 도구를 사용하면 하나의 토큰 파일로 iOS, Android, 웹 각 플랫폼에 맞는 코드를 자동 생성할 수 있습니다. 이는 대규모 팀의 일관성을 확보하는 데 필수적입니다.
