id: design.oklch
label: OKLCH
slug: oklch
short: "OKLCH는 색상의 밝기(L), 채도(C), 색상(H)을 인간의 시각 인지에 맞춰 균일하게 표현하는 색 공간입니다. CSS Color Module Level 4에 포함되어 웹에서 직접 사용할 수 있습니다."
long: |-
  OKLCH는 기존 RGB나 HSL의 비균일성 문제를 해결하기 위해 만들어진 지각적(perceptual) 색 공간입니다. L(밝기)은 0~1, C(채도)는 0~0.4 정도, H(색상각)은 0~360도로 구성되며, 같은 L값에서 채도를 높여도 어둡지 않고 깔끔한 색상 변화를 보여줍니다. 이 덕분에 디자이너는 기계적인 수치보다 실제로 보이는 느낌에 맞춰 색을 조정할 수 있습니다.

  OKLCH는 특히 컬러 시스템이나 디자인 토큰에서 유용합니다. 예를 들어, 특정 색상의 채도만 일관되게 올리거나 내리는 작업을 RGB보다 훨씬 직관적으로 할 수 있습니다. 또한 현대 브라우저에서 CSS로 `oklch(70% 0.15 240)` 같은 형태로 직접 선언 가능합니다. 이를 통해 디자인 시스템에서 일관된 색상 관리를 쉽게 구현할 수 있습니다.
