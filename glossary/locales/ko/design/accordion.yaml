id: design.accordion
label: Accordion
slug: accordion
short: "아코디언(Accordion)은 제목을 클릭하면 해당 콘텐츠 영역이 세로로 펼쳐지거나 접히는 UI 패턴입니다. 여러 섹션 중 하나만 열리거나 동시에 여러 개를 열 수 있도록 설계할 수 있습니다."
long: |-
  아코디언은 제한된 공간에서 많은 양의 정보를 계층적으로 보여줄 때 효과적입니다. 사용자는 각 섹션의 제목만 먼저 훑어본 후, 필요한 항목만 선택적으로 열어 상세 내용을 확인할 수 있습니다. 이 패턴은 FAQ, 설정 메뉴, 제품 상세 페이지의 옵션 설명 등에서 자주 사용됩니다. 한 번에 한 섹션만 열리도록 하거나 여러 섹션을 동시에 열 수 있게 설계할 수 있습니다.

  아코디언은 접근성 측면에서 중요한 고려사항이 있습니다. 키보드만으로도 각 제목에 포커스를 이동하고, Enter나 Space로 열고 닫을 수 있어야 합니다. 또한 `aria-expanded`, `aria-controls` 등의 WAI-ARIA 속성을 활용하여 스크린 리더 사용자에게 현재 상태를 명확히 전달해야 합니다. 모바일 환경에서는 터치 영역을 충분히 크게 잡고, 애니메이션을 부드럽게 처리하는 것이 사용자 경험에 좋습니다.
