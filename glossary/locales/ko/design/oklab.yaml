id: design.oklab
label: Oklab
slug: oklab
short: "Oklab은 OKLCH의 밑바탕이 되는 직교 좌표계 색 공간으로, L(밝기), a(초록-빨강 축), b(파랑-노랑 축)로 구성된 지각 균일 색 공간입니다. 인간의 시각 시스템과 유사하게 색 차이를 측정하도록 설계되었습니다."
long: |-
  Oklab은 인간의 시각 시스템과 매우 유사하게 색 차이를 측정하도록 설계된 색 공간입니다. a축은 음수에서 양수로 갈수록 초록에서 빨강으로, b축은 파랑에서 노랑으로 변합니다. L값이 동일할 때 a와 b의 변화가 밝기 인지에 영향을 거의 주지 않아, 그레이디언트나 색상 변형 작업이 매우 예측 가능합니다. 이는 디자인 작업에서 일관된 밝기를 유지하면서 색상을 조정할 수 있게 합니다.

  Oklab은 OKLCH와 수학적으로 쉽게 변환됩니다. 실제 디자인 작업에서는 주로 OKLCH를 더 직관적으로 사용하지만, Oklab의 a,b 좌표는 색상 간 거리 계산이나 두 색 사이의 보간이 필요할 때 더 유리합니다. 예를 들어, 다크 모드와 라이트 모드 간 색상 매핑을 자동으로 생성할 때 Oklab 좌표계를 기반으로 계산하면 자연스러운 결과를 얻을 수 있습니다. 이는 테마 전환 시 색상 변화를 부드럽게 만들어줍니다.
