id: design.user-select
label: User Select
slug: user-select
short: "`user-select`는 CSS 속성으로, 사용자가 웹 페이지에서 텍스트를 선택할 수 있는지 여부를 제어합니다. 이 속성은 드래그 하이라이트 동작을 허용하거나 차단하는 데 사용됩니다."
long: |-
  `user-select` 속성은 주로 네 가지 값을 가집니다. `auto`는 브라우저 기본 동작을 따르고, `none`은 텍스트 선택을 차단하며, `text`는 텍스트 선택을 강제하고, `all`은 한 번의 클릭이나 탭으로 전체 요소 내용이 선택되게 합니다. 부분적인 제어도 가능하며, 부모 요소에 `user-select: none`을 적용한 뒤 자식 요소에 `user-select: text`를 적용하면 특정 영역만 다시 선택 가능하게 만들 수 있습니다. 이 속성은 상속되므로, `body { user-select: none; }`처럼 넓은 범위에 적용하면 페이지 전체의 텍스트 선택을 차단할 수 있습니다.

  접근성 관점에서 `user-select: none`은 신중하게 사용해야 합니다. 텍스트 선택을 완전히 차단하면 읽기 위치를 하이라이트하며 따라가는 사용자나 오류 메시지와 코드를 복사해야 하는 사용자에게 불편을 줄 수 있습니다. 일반적으로 이 속성은 버튼 내부의 장식 아이콘이나 슬라이더 핸들처럼 선택이 의미 없는 영역에만 제한적으로 사용해야 합니다. 디자인 시스템에서는 기본적으로 일반 텍스트를 선택 가능하게 두고, 조작 부품과 장식 요소만 예외로 정의하는 것이 좋습니다.
