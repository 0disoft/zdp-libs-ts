id: design.focus-visible
label: Focus Visible
slug: focus-visible
short: "Focus Visible(가시적 포커스)은 키보드 포커스를 받은 모든 요소가 시각적으로 식별 가능해야 한다는 접근성 원칙입니다. 사용자가 현재 어떤 요소를 조작하고 있는지 명확히 알 수 있어야 합니다."
long: |-
  Focus Visible은 단순히 포커스 링이 존재하는 것을 넘어, 충분히 눈에 띄어야 한다는 것을 의미합니다. `WCAG 2.4.7`은 키보드로 포커스를 받을 수 있는 모든 요소에 포커스 표시기가 시각적으로 보여야 한다고 명시합니다. 예를 들어 버튼의 배경색이 미묘하게 변하는 것만으로는 Focus Visible로 간주되지 않을 수 있습니다. 대신 테두리나 글로우, 밑줄 등 주변과 뚜렷이 구분되는 시각적 변화가 필요합니다.

  Focus Visible은 최소 2픽셀 두께의 시각적 표시와 배경 대비 `3:1` 이상의 명도 차이를 충족해야 합니다. 요소 경계를 넘어 확장되어도 인지 가능한 표시를 제공하는 것이 좋습니다. 개발 도구 측면에서는 브라우저 개발자 도구에서 `:focus-visible` 상태를 강제로 활성화하여 테스트할 수 있습니다. 접근성과 보안의 교차점에서 Focus Visible 위반은 서비스 거부 유형의 장벽을 만들 수 있습니다.
