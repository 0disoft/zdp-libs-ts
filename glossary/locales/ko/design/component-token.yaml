id: design.component-token
label: Component Token
slug: component-token
short: "Component Token은 특정 UI 컴포넌트(예: 버튼, 카드, 모달)의 스타일을 정의하는 시맨틱 토큰의 한 종류입니다. 컴포넌트의 각 상태와 요소에 매핑되어 사용됩니다."
long: |-
  Component Token은 `button.background.default`, `button.background.hover`, `button.border.radius`, `card.padding`, `modal.overlay.color` 등과 같이 특정 컴포넌트의 모든 스타일 속성을 이름으로 관리합니다. 이 토큰들은 보통 Primitive Token이나 기능 토큰을 참조하며, 컴포넌트 자체가 직접 원시값을 보지 않도록 캡슐화합니다. 예를 들어 `button.background.primary.default`는 `color.blue.500`을 가리키고, `color.blue.500`은 다시 `#0066FF`를 가리킵니다. 이렇게 계층적 참조를 통해 디자인 결정을 일관되게 추적할 수 있습니다.

  Component Token을 사용하면 디자인 시스템의 확장성이 극적으로 향상됩니다. 새로운 테마(예: 다크 모드, 고대비 모드, 브랜드 스킨)를 도입할 때, 각 컴포넌트 토큰이 가리키는 값만 다른 토큰 세트로 교체하면 전체 UI가 자동 변경됩니다. 또한 개발자는 `button` 컴포넌트를 구현할 때 `var(--button-background-default)` 같은 Component Token만 사용하면 돼서, 디자인 변경이 생겨도 컴포넌트 코드 자체는 수정할 필요가 없습니다. 이를 통해 디자이너와 개발자 간의 협업이 "토큰 이름"이라는 명확한 인터페이스로 추상화됩니다.
