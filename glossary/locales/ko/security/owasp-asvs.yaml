id: security.owasp-asvs
label: OWASP ASVS
slug: owasp-asvs
short: "OWASP ASVS는 웹 애플리케이션 및 API의 보안 요구사항을 계층화하여 정의한 테스트 및 검증 표준입니다. 애플리케이션 보안 검증 표준으로, 체계적인 보안 테스트를 위한 프레임워크를 제공합니다."
long: |-
  OWASP ASVS는 단순한 체크리스트가 아닌 보안 검증 표준입니다. 보안 수준에 따라 3개의 레벨로 구분되며, 약 300개 이상의 검증 가능한 요구사항을 포함합니다. 이 요구사항은 아키텍처, 인증, 세션 관리, 접근 제어, 입력 검증, 암호화, 로깅, 데이터 보호 등 19개 카테고리로 구성됩니다. ASVS의 핵심 철학은 모든 요구사항이 자동화된 테스트나 수동 침투 테스트로 명확히 확인 가능해야 한다는 것입니다.

  디자인 시스템 및 프론트엔드 개발 관점에서 ASVS는 보안 감사 로그와 직접 연결된 요구사항들을 포함합니다. 예를 들어, V7 항목에서는 모든 인증 실패와 접근 권한 위반이 보안 감사 로그에 기록되어야 하며, 로그에 민감 정보가 포함되어서는 안 됩니다. 또한 V1에서는 Append-Only 감사 로그의 사용을 권장하고, 모든 접근 제어 결정을 중앙화된 정책 엔진에서 수행하는 것이 요구됩니다. ASVS를 디자인 시스템에 통합하려면 개발자 가이드라인과 자동화된 보안 테스트 파이프라인으로 함께 관리해야 합니다.
