id: security.webhook-secret
label: Webhook Secret
slug: webhook-secret
short: "웹훅 시크릿은 웹훅 요청이 신뢰할 수 있는 발신자로부터 온 것임을 검증하기 위해 사용하는 공유 비밀 키입니다. 발신자와 수신자가 사전에 공유한 시크릿 문자열을 기반으로 HMAC 해시를 계산하여 요청의 무결성을 확인합니다."
long: |-
  웹훅은 특정 이벤트가 발생하면 서버가 미리 지정된 URL로 HTTP 요청을 보내는 방식입니다. 악의적인 제3자가 가짜 요청을 보내는 것을 방지하기 위해, 발신자와 수신자가 사전에 공유한 시크릿 문자열을 사용합니다. 발신자는 요청 헤더에 시크릿으로 계산한 HMAC 해시를 함께 보냅니다. 수신자는 동일한 시크릿으로 요청 본문의 해시를 다시 계산하여 두 값이 일치하는지 확인합니다.

  웹훅 시크릿을 안전하게 관리하려면 환경 변수나 비밀 관리 도구에 저장해야 하며, 코드 저장소에 하드코딩해서는 안 됩니다. 시크릿은 충분히 길고 무작위적인 문자열을 사용해야 합니다. 일부 서비스는 웹훅 요청의 IP 주소 범위를 함께 검증하기도 합니다. 수신 서버에서는 시크릿을 주기적으로 교체하는 로테이션 정책을 적용하는 것이 좋습니다.
