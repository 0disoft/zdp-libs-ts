id: security.api-key
label: API Key
slug: api-key
short: "API Key는 클라이언트(애플리케이션, 서비스, 사용자)를 식별하고 API 요청을 인증하기 위해 사용되는 고유한 문자열입니다. HTTP 헤더(주로 `X-API-Key` 또는 `Authorization: Bearer`)에 담아 서버로 전송됩니다."
long: |-
  API Key는 Secret의 한 종류로, 단순한 인증 메커니즘을 제공합니다. 사용자명과 비밀번호와 달리, 사람이 기억할 필요 없이 기계 간 통신에서 사용됩니다. API Key가 있으면 누가 또는 어떤 애플리케이션이 요청을 보내는지 식별할 수 있습니다. 이를 기반으로 속도 제한, 사용량 추적, 접근 권한 범위를 적용할 수 있습니다.

  API Key의 가장 큰 취약점은 전송 중 또는 저장 중에 노출될 위험입니다. 프론트엔드 코드에 API Key를 포함하는 것은 안전하지 않습니다. 따라서 API Key는 백엔드 서버에서만 사용하고, 프론트엔드 호출은 백엔드를 프록시로 두어야 합니다. API Key는 정기적으로 순환하고, 유출 즉시 폐기하며, 환경마다 다른 Key를 사용해야 합니다.
