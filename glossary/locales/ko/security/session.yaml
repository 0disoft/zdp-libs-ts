id: security.session
label: Session
slug: session
short: "Session(세션)은 사용자가 웹사이트나 애플리케이션과 상호작용하는 일련의 기간 동안 서버 측에 유지되는 상태 정보입니다. 로그인 상태, 장바구니 아이템, 사용자 설정 등을 임시로 저장하여 HTTP의 무상태성(stateless) 문제를 해결합니다."
long: |-
  Session은 기본적으로 서버 메모리나 Redis 같은 인메모리 데이터 저장소에 유지됩니다. 사용자가 로그인에 성공하면 서버는 고유한 Session ID를 생성하여 쿠키(`Set-Cookie: sessionId=abc123`) 형태로 브라우저에 전달합니다. 이후 모든 요청마다 브라우저는 이 쿠키를 자동으로 첨부하고, 서버는 Session ID로 저장된 정보를 조회하여 "이 사용자는 이미 인증된 상태"임을 알 수 있습니다. Session은 보통 일정 시간(예: 30분) 동안 활동이 없으면 만료(expiration)되어 자동 삭제되도록 설정합니다.

  Session의 주요 장점은 보안에 있습니다. 실제 사용자 데이터는 서버에만 존재하고, 클라이언트에는 참조용 식별자만 있기 때문입니다. 그러나 서버가 세션 정보를 저장해야 하므로, 트래픽이 많은 서비스에서는 수평 확장이 까다로워집니다. 이를 해결하기 위해 스티키 세션이나 공유 세션 저장소를 사용하거나, JWT 같은 무상태 토큰을 도입하기도 합니다.
