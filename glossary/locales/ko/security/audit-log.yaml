id: security.audit-log
label: Security Audit Log
slug: security-audit-log
short: "Security Audit Log(보안 감사 로그)는 시스템 내 모든 중요한 보안 이벤트를 순차적으로 기록하는 변경 불가능한 로그입니다. 로그인 시도, 권한 변경, 데이터 접근, 설정 변경 등의 이벤트가 기록 대상이며, 법적 규제 준수를 위해 사용됩니다."
long: |-
  보안 감사 로그는 일반 애플리케이션 로그와 달리 "누가, 언제, 어디서, 무엇을, 어떻게" 했는지를 법적·규제적 증거로 사용할 수 있도록 설계됩니다. 기록 대상 이벤트의 예로는 관리자 권한 상승, 민감 데이터 열람, 실패한 로그인 시도, 정책 변경, 사용자 계정 잠금/해제, MFA 설정 변경 등이 있습니다. 각 로그 엔트리는 반드시 신뢰할 수 있는 타임스탬프와 사용자 식별자, 소스 IP 주소, 요청 ID를 포함해야 합니다. 작업 대상 리소스와 결과(성공/실패)도 함께 기록되어야 합니다.

  보안 감사 로그의 핵심 요구사항은 변조 불가능성과 무결성입니다. 일반 데이터베이스 테이블에 저장하면 관리자가 직접 로그를 수정하거나 삭제할 수 있기 때문에, 대신 전용 로깅 시스템이나 WORM 스토리지, 또는 해시 체인 기법을 사용합니다. 규제 준수 측면에서 SOC2, ISO 27001, PCI-DSS, HIPAA 등은 대부분 최소 1년에서 7년 이상의 감사 로그 보관을 요구합니다. 로그의 무결성을 정기적으로 검증하는 절차도 필수입니다.
