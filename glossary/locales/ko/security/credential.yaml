id: security.credential
label: Credential
slug: credential
short: "Credential(자격 증명)은 사용자, 애플리케이션, 또는 시스템의 신원을 확인하고 접근 권한을 부여하기 위해 사용되는 정보 조합입니다. 가장 흔한 예는 사용자명과 비밀번호이며, 인증(Authentication) 과정에서 사용됩니다."
long: |-
  Credential은 Secret보다 더 넓은 개념으로, 신원 확인에 필요한 모든 종류의 증거물을 포함합니다. 패스워드, API 키, OAuth 토큰, JWT(JSON Web Token), 인증서, 생체 정보(지문, 얼굴 인식), 하드웨어 키(YubiKey), 일회성 패스코드(OTP) 등 모두 Credential에 속합니다. 일반적으로 Credential은 식별자(Identifier)와 인증 요소(Authentication Factor)의 조합으로 구성됩니다. 인증 요소는 지식(아는 것, 비밀번호), 소유(가진 것, 보안 토큰), 존재(있는 것, 지문) 세 가지 요소 중 하나 이상이 될 수 있습니다.

  Credential 관리에서 가장 중요한 개념은 저장 방식입니다. 비밀번호는 절대 평문으로 저장하지 말고, 반드시 솔트를 곁들여 해싱한 후 저장해야 합니다. API 키나 OAuth 토큰은 암호화된 상태로 저장하거나 전용 시크릿 스토어에 보관합니다. 전송은 HTTPS/TLS로 암호화해야 하며, 멀티 팩터 인증은 하나의 Credential만으로 부족할 때 추가 요소를 요구합니다.
