id: operations.rate-limit
label: Rate Limit
slug: rate-limit
short: "Rate Limit(요청 제한)은 특정 시간 동안 클라이언트(사용자, IP, API 키 등)가 서버에 보낼 수 있는 요청의 최대 횟수를 제한하는 보안 및 안정성 기법입니다. 임계치를 초과하면 서버는 추가 요청을 거부하고 일정 시간 대기를 요구합니다."
long: |-
  Rate Limit은 DDoS 공격, 무차별 대입 공격(brute force), API 남용, 크롤링 과부하 등을 방지하기 위해 설계되었습니다. 일반적으로 "분당 100회 요청", "초당 10회 로그인 시도" 같은 형태로 정의되며, 임계치를 초과하면 HTTP 429(Too Many Requests) 상태 코드를 반환합니다. 알고리즘으로는 고정 창(Fixed Window), 슬라이딩 창(Sliding Window), 토큰 버킷(Token Bucket), 누출 버킷(Leaky Bucket) 등이 있습니다. 구현 시에는 Redis, Memcached, 또는 API 게이트웨이(AWS API Gateway, Kong, Tyk)의 내장 기능을 활용합니다.

  보안 감사 로그 관점에서 Rate Limit 위반 이벤트는 반드시 기록되어야 합니다. 연속적인 Rate Limit 초과는 계정 탈취 시도나 공격 패턴을 탐지하는 중요한 지표가 되기 때문입니다. 또한 디자인 시스템의 UI 컴포넌트 수준에서는, Rate Limit이 걸린 API를 호출하는 버튼이나 폼은 제한 상태를 시각적으로 피드백하고, 자동 재시도 로직을 구현해야 합니다. OWASP ASVS의 V5(입력 검증) 및 V3(세션 관리) 항목에서도 Rate Limit은 핵심 요구사항으로 명시되어 있습니다.
