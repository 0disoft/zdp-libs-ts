id: operations.deletion-propagation
label: Deletion Propagation
slug: deletion-propagation
short: "삭제 전파(Deletion Propagation)는 데이터베이스에서 부모 레코드 삭제 시 연관된 자식 레코드의 처리를 정의하는 외래 키 제약 조건 메커니즘입니다. 관계형 데이터베이스에서는 `ON DELETE CASCADE`, `SET NULL`, `RESTRICT` 같은 방식으로 이를 구현합니다."
long: |-
  관계형 데이터베이스는 삭제 전파를 위해 `ON DELETE CASCADE`, `ON DELETE SET NULL`, `ON DELETE RESTRICT` 또는 `NO ACTION` 같은 방식을 제공합니다. `CASCADE`는 부모 삭제 시 모든 자식 레코드를 자동 삭제하며, `SET NULL`은 자식의 외래 키를 NULL로 설정합니다. `RESTRICT`는 자식 레코드가 존재할 경우 부모 삭제 자체를 차단하여 오류를 발생시킵니다. 애플리케이션 수준에서도 구현 가능하지만, 데이터 무결성을 보장하려면 데이터베이스 제약 조건을 활용하는 것이 더 안전하고 선언적입니다.

  올바른 삭제 전파 전략은 도메인 로직에 따라 달라지며, 주문(Order)이 삭제될 때 해당 주문의 상세 항목(OrderItem)도 함께 사라져야 한다면 `CASCADE`가 적합합니다. 반면, 부서(Department)가 삭제될 때 해당 부서 소속 직원(Employee)의 부서 ID를 NULL로 설정하거나(`SET NULL`), 직원이 남아 있다면 부서 삭제를 막는(`RESTRICT`) 것이 비즈니스 규칙에 부합할 수 있습니다. NoSQL 데이터베이스에서는 삭제 전파를 애플리케이션에서 직접 구현해야 하며, 여러 컬렉션 간 일관성을 유지하기 위해 트랜잭션이나 이벤트 소싱(event sourcing) 패턴을 사용하는 것이 일반적입니다. 실제 프로덕션 환경에서는 하드 삭제보다 `deleted_at` 타임스탬프를 두는 소프트 삭제(soft delete)를 선호하는 경우도 많습니다.
