human_review_required:
  - package publish
  - breaking package api changes
  - package boundary changes

exit:
  success_criteria:
    - initial package boundaries are reviewable without product code
    - package export subpaths are fixed before package publish
    - shared TypeScript packages consume zdp-api-contracts source contracts without owning API truth
    - shared TypeScript packages validate route/error/webhook/SDK input drift against zdp-api-contracts
    - common TypeScript packages do not own product rules
    - package boundary, API source handoff, schema, env, event, error, i18n, and glossary click sheet contracts are machine-validated
  kill_criteria:
    - product-specific models leak into common packages
    - provider SDK wrappers become common contract packages
    - glossary backend, advertising runtime, or private glossary data leak into common packages
  sunset_plan: null
  owner: 0disoft
  review_at: null
  user_notice_days: null
  data_export_window_days: null
  dependency_removal_checklist: []

notes:
  - This MVP owns package boundaries only; it does not publish packages.
  - The local checker reads committed contract YAML only; it does not publish or build package artifacts.
  - API contract source handoff keeps shared TypeScript packages tied to zdp-api-contracts before package exports exist.
  - API source input drift checks prevent request_id, trace_id, idempotency, webhook metadata, and SDK generation targets from splitting between libs and API contracts.
  - Public export skeleton fixes import entry names before runtime validators exist.
  - Glossary contract owns term metadata, manifest type, and click/right-sheet/bottom-sheet interaction boundaries only; ZDP product glossary data remains in product repos or private data packages.
  - Glossary contract exposes stable term_id ownership so labels, aliases, translations, analytics, and sheet events do not use display text as identity.
