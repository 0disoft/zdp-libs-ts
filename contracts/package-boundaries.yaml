packages:
  - name: "@zdp/schema"
    status: planned
    owns:
      - schema metadata helpers
    must_not_own:
      - product domain models
  - name: "@zdp/env-contract"
    status: planned
    owns:
      - environment variable contract metadata
    must_not_own:
      - secret values
  - name: "@zdp/event-contracts"
    status: planned
    owns:
      - event envelope metadata
    must_not_own:
      - queue provider implementation
  - name: "@zdp/error"
    status: planned
    owns:
      - standard error code metadata
      - standard error envelope metadata
    must_not_own:
      - provider raw errors
  - name: "@zdp/i18n-contract"
    status: planned
    owns:
      - message key and argument contracts
    must_not_own:
      - translation runtime
  - name: "@zdp/glossary-contract"
    status: planned
    owns:
      - glossary term metadata contract
      - glossary manifest type contract
    must_not_own:
      - glossary backend CMS
      - advertising runtime
      - product domain copy final approval

error_envelope:
  required_fields:
    - error
    - code
    - message
    - request_id
    - trace_id
  forbidden_fields:
    - raw_customer_payload
    - raw_provider_error
    - provider_secret
    - authorization_header
    - cookie_header
    - refresh_token_plaintext
    - stack_trace
    - screen_component_payload
